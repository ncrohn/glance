<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Glance</title>
    <script>
      // Set the theme before first paint to avoid a flash. Mirrors theme.ts:
      // "auto" / unknown → Paper (light) or Ink (dark) per the OS.
      (function () {
        try {
          var p = localStorage.getItem("glance.theme");
          var id = !p || p === "auto"
            ? (matchMedia("(prefers-color-scheme: dark)").matches ? "ink" : "paper")
            : p;
          document.documentElement.dataset.theme = id;
        } catch (e) {}
      })();
    </script>
  </head>

  <body>
    <header id="titlebar" data-tauri-drag-region>
      <div class="tl-spacer" data-tauri-drag-region></div>
      <div id="tabs" class="tabs" data-tauri-drag-region></div>
      <div id="titlebar-actions" class="titlebar-actions" data-tauri-drag-region></div>
    </header>
    <div id="workspace">
      <main id="content"></main>
      <aside id="rail" class="empty"></aside>
    </div>
    <div id="modal-root"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
